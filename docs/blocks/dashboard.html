<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Block — My UI Kit</title>
  <link rel="stylesheet" href="../../core/dist/ui-kit.css">
</head>
<body class="bg-neutral-50 p-8 text-neutral-900 dark:bg-neutral-900 dark:text-neutral-100">
  <main class="mx-auto max-w-6xl">
    <a class="text-sm text-primary-600 dark:text-primary-400" href="../index.html">← Kembali ke Docs</a>
    <div class="mt-6 flex items-start justify-between gap-4">
      <div>
        <span class="badge badge-success">Block</span>
        <h1 class="mt-3 text-3xl font-semibold">Dashboard Stats</h1>
        <p class="mt-3 text-neutral-600 dark:text-neutral-300">Contoh block gabungan card, badge, button, dan utility Tailwind.</p>
      </div>
      <button class="btn btn-outline btn-sm" data-theme-toggle>Theme</button>
    </div>

    <section class="mt-8 grid gap-4 md:grid-cols-3">
      <div class="card">
        <div class="card-body">
          <p class="text-sm text-neutral-500 dark:text-neutral-400">Revenue</p>
          <div class="mt-3 flex items-end justify-between">
            <strong class="text-2xl">Rp 24,8jt</strong>
            <span class="badge badge-success">+12%</span>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-body">
          <p class="text-sm text-neutral-500 dark:text-neutral-400">Orders</p>
          <div class="mt-3 flex items-end justify-between">
            <strong class="text-2xl">1.240</strong>
            <span class="badge badge-primary">Aktif</span>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-body">
          <p class="text-sm text-neutral-500 dark:text-neutral-400">Pending</p>
          <div class="mt-3 flex items-end justify-between">
            <strong class="text-2xl">18</strong>
            <span class="badge badge-warning">Review</span>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="../../core/js/theme-toggle.js"></script>
</body>
</html>
