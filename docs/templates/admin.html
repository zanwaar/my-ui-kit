<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Template — My UI Kit</title>
  <link rel="stylesheet" href="../../core/dist/ui-kit.css">
</head>
<body class="bg-neutral-100 text-neutral-900 dark:bg-neutral-900 dark:text-neutral-100">
  <div class="min-h-screen md:grid md:grid-cols-[240px_1fr]">
    <aside class="border-b border-neutral-200 bg-white p-4 dark:border-neutral-800 dark:bg-neutral-900 md:border-b-0 md:border-r">
      <a class="text-lg font-semibold" href="../index.html">My UI Kit</a>
      <nav class="mt-8 space-y-2 text-sm">
        <a class="block rounded bg-primary-50 px-3 py-2 text-primary-700 dark:bg-neutral-800 dark:text-primary-300" href="#">Dashboard</a>
        <a class="block rounded px-3 py-2 hover:bg-neutral-100 dark:hover:bg-neutral-800" href="#">Orders</a>
        <a class="block rounded px-3 py-2 hover:bg-neutral-100 dark:hover:bg-neutral-800" href="#">Customers</a>
      </nav>
    </aside>
    <main class="p-6">
      <div class="flex items-center justify-between gap-4">
        <div>
          <span class="badge badge-primary">Template</span>
          <h1 class="mt-3 text-3xl font-semibold">Admin Dashboard</h1>
        </div>
        <button class="btn btn-outline btn-sm" data-theme-toggle>Theme</button>
      </div>
      <section class="mt-8 grid gap-4 lg:grid-cols-[1fr_320px]">
        <div class="card">
          <div class="card-header">Recent Orders</div>
          <div class="card-body space-y-3">
            <div class="flex items-center justify-between rounded border border-neutral-200 p-3 dark:border-neutral-800"><span>Invoice #1001</span><span class="badge badge-success">Paid</span></div>
            <div class="flex items-center justify-between rounded border border-neutral-200 p-3 dark:border-neutral-800"><span>Invoice #1002</span><span class="badge badge-warning">Pending</span></div>
            <div class="flex items-center justify-between rounded border border-neutral-200 p-3 dark:border-neutral-800"><span>Invoice #1003</span><span class="badge badge-danger">Failed</span></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">Quick Action</div>
          <div class="card-body space-y-3">
            <button class="btn btn-primary w-full">Create Report</button>
            <button class="btn btn-outline w-full">Export Data</button>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="../../core/js/theme-toggle.js"></script>
</body>
</html>
